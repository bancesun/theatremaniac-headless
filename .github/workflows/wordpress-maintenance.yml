name: WordPress Maintenance

on:
  workflow_dispatch:
    inputs:
      mode:
        description: audit or apply
        required: true
        default: audit
      publish_ids:
        description: Comma-separated draft post IDs to publish
        required: false
        default: ""
      trash_ids:
        description: Comma-separated copy post IDs to move to trash
        required: false
        default: ""

permissions:
  contents: read

jobs:
  maintenance:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      WP_URL: ${{ secrets.WP_URL || 'https://cms.theatremaniac.com' }}
      WP_USER: ${{ secrets.WP_USER }}
      WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
      MODE: ${{ inputs.mode }}
      PUBLISH_IDS: ${{ inputs.publish_ids }}
      TRASH_IDS: ${{ inputs.trash_ids }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run WordPress maintenance
        run: |
          test -n "$WP_USER" || { echo "::error::Missing GitHub secret WP_USER."; exit 1; }
          test -n "$WP_APP_PASSWORD" || { echo "::error::Missing GitHub secret WP_APP_PASSWORD."; exit 1; }
          node scripts/wp-maintenance.mjs \
            --mode "$MODE" \
            --publish-ids "$PUBLISH_IDS" \
            --trash-ids "$TRASH_IDS"
